app = "moorfall"
primary_region = "cdg"

[env]
  DB_PATH = "/data/moorfall.db"

[[mounts]]
  source = "moorfall_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
